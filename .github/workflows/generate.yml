name: Generate Rules

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
    paths:
      - "data/**"
      - "scripts/**"
      - "tests/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig.json"
      - ".github/workflows/generate.yml"
  pull_request:
    paths:
      - "data/**"
      - "scripts/**"
      - "tests/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig.json"
      - ".github/workflows/generate.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 10.27.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm test
      - run: pnpm generate
      - name: Commit generated rules
        if: github.event_name == 'push'
        run: |
          git config user.name "vps.dance"
          git config user.email "dancevps@gmail.com"
          git add rules
          if git diff --cached --quiet; then
            echo "No rule changes"
          else
            git commit -m "Update generated rules"
            git push
          fi
