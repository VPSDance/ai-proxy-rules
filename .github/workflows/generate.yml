name: Generate Rules

on:
  push:
    branches:
      - main
    paths:
      - "data/**"
      - "scripts/**"
      - "tests/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig.json"
      - ".github/workflows/generate.yml"
  pull_request:
    paths:
      - "data/**"
      - "scripts/**"
      - "tests/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig.json"
      - ".github/workflows/generate.yml"
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: corepack enable
      - run: corepack prepare pnpm@10.27.0 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm sync
      - run: pnpm check
      - run: pnpm test
      - run: pnpm generate
      - name: Commit generated data and rules
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "vps.dance"
          git config user.email "dancevps@gmail.com"
          git add data rules
          if git diff --cached --quiet; then
            echo "No generated changes"
          else
            git commit -m "Update generated data and rules"
            git push
          fi
