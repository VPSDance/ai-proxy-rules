provider: anthropic
name: Anthropic
description: Anthropic and Claude services.
groups:
  - name: Core
    rules:
      domainSuffix:
        - anthropic.com
        - anthropic.com.cn
        - clau.de
        - claude.ai
        - claude.com
        - claudemcpclient.com
        - claudeusercontent.com
        - modelcontextprotocol.io
  - name: Network
    rules:
      ipCidr:
        - 160.79.104.0/21
      ipCidr6:
        - 2607:6bc0::/48
      asn:
        - 399358
  - name: Third-Party
    rules:
      domain:
        - anthropic-com.ghost.io
        - anthropic.auth0.com
        - anthropic.com.cdn.cloudflare.net
        - browser-intake-us5-datadoghq.com
        - cdn.growthbook.io
        - cdn.usefathom.com
        - servd-anthropic-website.b-cdn.net
        - storage.googleapis.com
      domainSuffix:
        - intercom.io
        - intercomcdn.com
        - sentry.io
        - statsigapi.net
      domainKeyword:
        - datadog
        - sift
