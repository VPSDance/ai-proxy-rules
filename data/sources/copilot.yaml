provider: copilot
name: Copilot
description: Microsoft Copilot and related services.
sources:
  - name: blackmatrix7
    type: remote-text
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/Copilot/Copilot.list
    parser: classical
  - name: v2fly
    type: remote-text
    url: https://raw.githubusercontent.com/v2fly/domain-list-community/master/data/github-copilot
    parser: domain-list-community
groups:
  - name: Core
    include:
      domainSuffix:
        - copilot.microsoft.com
        - githubcopilot.com
      domain:
        - copilot.microsoft.com
        - githubcopilot.com
        - location.microsoft.com
        - odc.officeapps.live.com

  - name: Network
    include:
      ipCidr:
        - 24.199.123.28/32
        - 64.23.132.171/32
    fromSource:
      - ipCidr

  - name: Third-Party
    include:
      domainSuffix:
        - algolia.net
        - api.microsoftapp.net
        - auth0.com
        - bing-shopping.microsoft-falcon.io
        - challenges.cloudflare.com
        - edgeservices.bing.com
        - events.statsigapi.net
        - featuregates.org
        - identrust.com
        - intercom.io
        - intercomcdn.com
        - launchdarkly.com
        - observeit.net
        - segment.io
        - sentry.io
        - stripe.com
    fromSource: true
patch:
  remove:
    domain:
      - chat.openai.com.cdn.cloudflare.net
      - openai-api.arkoselabs.com
      - openaicomproductionae4b.blob.core.windows.net
      - production-openaicom-storage.azureedge.net
      - r.bing.com
      - services.bingapis.com
      - www.bing.com
    asn:
      - 20473
    domainSuffix:
      - chatgpt.com
      - chatgpt.livekit.cloud
      - host.livekit.cloud
      - oaistatic.com
      - oaiusercontent.com
      - openai.com
      - openaiapi-site.azureedge.net
      - openaicom.imgix.net
      - turn.livekit.cloud
    domainKeyword:
      - openaicom-api
    ipCidr:
      - 24.199.123.28/32
      - 64.23.132.171/32
