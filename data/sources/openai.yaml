provider: openai
name: OpenAI
description: OpenAI and ChatGPT services.
categories:
  - coding
  - model
aliases:
  - chatgpt
  - codex
sources:
  - name: blackmatrix7
    type: remote-text
    url: https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/OpenAI/OpenAI.yaml
    parser: clash-yaml
    importAsn: false
  - name: v2fly
    type: remote-text
    url: https://cdn.jsdelivr.net/gh/v2fly/domain-list-community@master/data/openai
    parser: domain-list-community
    importAsn: false
groups:
  - name: Core
    include:
      domainSuffix:
        - ai.com
        - chat.com
        - chatgpt.com
        - chatgpt.livekit.cloud
        - crixet.com
        - oaistatic.com
        - oaiusercontent.com
        - openai.com
        - openaiapi-site.azureedge.net
        - openaicom.imgix.net
        - sora.com
      domainKeyword:
        - chatgpt-async-webps-prod
        - openai

  - name: Network
    include:
      asn:
        # OpenAI-owned ASN; replaces broad hosting ASN 20473 from upstream.
        - 401518
      ipCidr:
        - 199.47.142.0/23
      ipCidr6:
        - 2604:f20::/32
    fromSource:
      - ipCidr
      - ipCidr6

  - name: Third-Party
    include:
      domainSuffix:
        - statsigapi.net
    fromSource: true
patch:
  remove:
    asn:
      # Vultr ASN from upstream references; too broad for OpenAI-specific routing.
      - 20473
