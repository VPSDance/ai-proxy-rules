provider: openai
name: OpenAI
description: OpenAI and ChatGPT services.
sources:
  - name: blackmatrix7
    type: remote-text
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/OpenAI/OpenAI.yaml
    parser: mihomo-yaml
  - name: v2fly
    type: remote-text
    url: https://raw.githubusercontent.com/v2fly/domain-list-community/master/data/openai
    parser: domain-list-community
options:
  importAsnFromSource: false
groups:
  - name: Core
    include:
      domainSuffix:
        - ai.com
        - chat.com
        - chatgpt.com
        - chatgpt.livekit.cloud
        - crixet.com
        - oaistatic.com
        - oaiusercontent.com
        - openai.com
        - openaiapi-site.azureedge.net
        - openaicom.imgix.net
        - sora.com
      domainKeyword:
        - openai

  - name: Network
    include:
      asn:
        - 401518
      ipCidr:
        - 199.47.142.0/23
      ipCidr6:
        - 2604:f20::/32
    fromSourceTypes:
      - ipCidr
      - ipCidr6

  - name: Third-Party
    include:
      domainSuffix:
        - statsigapi.net
    fromSource: true
patch:
  remove:
    asn:
      - 20473
