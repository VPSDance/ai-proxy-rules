provider: anthropic
name: Anthropic
description: Anthropic and Claude services.
categories:
  - coding
  - model
aliases:
  - claude
  - claude-code
sources:
  - name: net-coffee
    type: remote-html
    url: https://ip.net.coffee/claude/site.html
    selector: ".tab-panel[data-panel=\"yaml\"] pre"
    parser: clash-yaml
    importAsn: false
  - name: xiaolai
    type: remote-text
    url: https://cdn.jsdelivr.net/gh/xiaolai/anthropic-claude-surge-rules-set@main/anthropic.list
    parser: classical
    importAsn: false
  - name: v2fly
    type: remote-text
    url: https://cdn.jsdelivr.net/gh/v2fly/domain-list-community@master/data/anthropic
    parser: domain-list-community
    importAsn: false
groups:
  - name: Core
    include:
      domainSuffix:
        - anthropic.com
        - anthropic.com.cn
        - claude.ai
        - claude.com
        - claudemcpclient.com
        - claudeusercontent.com
        - clau.de
        - modelcontextprotocol.io

  - name: Network
    include:
      asn:
        - 399358
      ipCidr:
        - 160.79.104.0/23
      ipCidr6:
        - 2607:6bc0::/48
    fromSource:
      - ipCidr
      - ipCidr6

  - name: Third-Party
    include:
      domain:
        - cdn.growthbook.io
        - storage.googleapis.com
      domainSuffix:
        - statsigapi.net
    fromSource: true
patch:
  remove:
    domain:
      - api.anthropic.com
      - cdn.anthropic.com
      - console.anthropic.com
      - downloads.claude.ai
      - mcp.anthropic.com
      - workbench.anthropic.com
    domainSuffix:
      - time.apple.com
    domainKeyword:
      - sentry
    ipCidr6:
      - 2607:6bc0::/32
    ipCidr:
      - 160.79.104.0/21
