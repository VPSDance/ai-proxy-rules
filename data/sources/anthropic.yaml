provider: anthropic
name: Anthropic
description: Anthropic and Claude services.
categories:
  - coding
  - model
aliases:
  - claude
  - claude-code
sources:
  - name: net-coffee
    type: remote-html
    url: https://ip.net.coffee/claude/site.html
    selector: ".tab-panel[data-panel=\"yaml\"] pre"
    parser: clash-yaml
    importAsn: false
  - name: xiaolai
    type: remote-text
    url: https://cdn.jsdelivr.net/gh/xiaolai/anthropic-claude-surge-rules-set@main/anthropic.list
    parser: classical
    importAsn: false
  - name: v2fly
    type: remote-text
    url: https://cdn.jsdelivr.net/gh/v2fly/domain-list-community@master/data/anthropic
    parser: domain-list-community
    importAsn: false
groups:
  - name: Core
    include:
      domainSuffix:
        - anthropic.com
        - anthropic.com.cn
        - claude.ai
        - claude.com
        - claudemcpclient.com
        - claudeusercontent.com
        - clau.de
        - modelcontextprotocol.io

  - name: Network
    include:
      asn:
        - 399358
      # Prefer the wider net-coffee ranges for Claude availability and account-risk mitigation.
      # The official narrower ranges are removed below to avoid duplicate overlapping CIDRs.
      ipCidr:
        - 160.79.104.0/21
      ipCidr6:
        - 2607:6bc0::/32
    fromSource:
      - ipCidr
      - ipCidr6

  - name: Third-Party
    include:
      domain:
        - cdn.growthbook.io
        - storage.googleapis.com
      domainSuffix:
        - statsigapi.net
      domainKeyword:
        # Keep net-coffee's broader Sentry coverage; Claude may use Sentry subdomains beyond sentry.io.
        - sentry
    fromSource: true
patch:
  remove:
    domain:
      # Covered by broader DOMAIN-SUFFIX rules in Core.
      - api.anthropic.com
      - cdn.anthropic.com
      - console.anthropic.com
      - downloads.claude.ai
      - mcp.anthropic.com
      - workbench.anthropic.com
    domainSuffix:
      # Not Anthropic-specific.
      - time.apple.com
    ipCidr6:
      # Covered by 2607:6bc0::/32 above.
      - 2607:6bc0::/48
    ipCidr:
      # Covered by 160.79.104.0/21 above.
      - 160.79.104.0/23
